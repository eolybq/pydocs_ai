name: FRONTEND-Hugging Face Hub Deployment

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:

jobs:
  deploy-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pyright pandas-stubs
          pip install -r requirements_streamlit.txt 

      - name: Ruff Check and Format
        run: |
          ruff check streamlit/ 
          ruff format --check --diff streamlit/

      - name: Pyright Type Check
        run: pyright streamlit/

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir -p /tmp/hf-deploy
          mkdir -p /tmp/hf-deploy/streamlit

          cp Dockerfile.frontend /tmp/hf-deploy/Dockerfile
          cp streamlit/metadata_hf.md /tmp/hf-deploy/README.md
          cp streamlit/main.py /tmp/hf-deploy/streamlit/
          cp -r streamlit/frontend /tmp/hf-deploy/streamlit/
          cp requirements_streamlit.txt /tmp/hf-deploy/requirements_streamlit.txt

          cd /tmp/hf-deploy
          git init
          git config user.email "bot@github.com"
          git config user.name "GitHub Actions Bot"
          git add .
          git commit -m "Deploy Frontend to HF Space"
          git remote add space "https://yezdata:$HF_TOKEN@huggingface.co/spaces/yezdata/pydocs-ai"
          git push space main --force
