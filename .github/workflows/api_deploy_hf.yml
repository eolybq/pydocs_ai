name: API-Hugging Face Hub Deployment

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:

jobs:
  deploy-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pyright
          pip install -r requirements_api.txt 

      - name: Ruff Check and Format
        run: |
          ruff check api/ src/
          ruff format --check --diff api/ src/core src/services/chat

      - name: Pyright Type Check
        run: pyright api/ src/core src/services/chat 

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir -p /tmp/hf-deploy
          mkdir -p /tmp/hf-deploy/api

          cp Dockerfile.api /tmp/hf-deploy/Dockerfile
          cp api/metadata_hf.md /tmp/hf-deploy/README.md
          cp requirements_api.txt /tmp/hf-deploy/requirements_api.txt
          cp api/main.py /tmp/hf-deploy/api/main.py
          cp -r src /tmp/hf-deploy/src

          cd /tmp/hf-deploy
          git init
          git config user.email "bot@github.com"
          git config user.name "GitHub Actions Bot"
          git add .
          git commit -m "Deploy API to HF Space"
          git remote add space "https://yezdata:$HF_TOKEN@huggingface.co/spaces/yezdata/pydocs-ai-api"
          git push space main --force